services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: paperclip
      POSTGRES_PASSWORD: paperclip
      POSTGRES_DB: paperclip
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paperclip -d paperclip"]
      interval: 2s
      timeout: 5s
      retries: 30
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build: .
    ports:
      - "3100:3100"
    environment:
      DATABASE_URL: postgres://paperclip:paperclip@db:5432/paperclip
      PORT: "3100"
      SERVE_UI: "true"
      PAPERCLIP_DEPLOYMENT_MODE: "authenticated"
      PAPERCLIP_DEPLOYMENT_EXPOSURE: "private"
      PAPERCLIP_PUBLIC_URL: "${PAPERCLIP_PUBLIC_URL:-http://localhost:3100}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}"
      PAPERCLIP_AGENT_JWT_SECRET: "${PAPERCLIP_AGENT_JWT_SECRET:?PAPERCLIP_AGENT_JWT_SECRET must be set}"
      PAPERCLIP_ALLOWED_HOSTNAMES: "server,localhost,paperclip.primeform.in"
      OPENROUTER_API_KEY: "${OPENROUTER_API_KEY:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN:-}"
    volumes:
      - paperclip-data:/paperclip
      - /home/rajesh/.claude:/paperclip/.claude
      # Dev mount: source code live-reload without rebuild
      - .:/app/src-mount:ro
    entrypoint: >
      sh -c '
        if [ -d /app/src-mount/server/src ]; then
          cp -r /app/src-mount/server/src/* /app/server/src/;
          cp -r /app/src-mount/packages/db/src/* /app/packages/db/src/;
          cp -r /app/src-mount/skills/* /app/skills/ 2>/dev/null || true;
        fi;
        exec node --import ./server/node_modules/tsx/dist/loader.mjs server/src/index.ts
      '
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  paperclip-data:
